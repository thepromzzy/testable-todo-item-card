<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Item Card • Internship Task</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --tw-color-primary: #3b82f6;
        }
        
        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        
        .todo-card {
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
        }
        
        .strike-through {
            text-decoration: line-through;
            text-decoration-thickness: 2px;
            opacity: 0.75;
        }
        
        .time-remaining {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center p-6 font-sans">
    
    <!-- Root Todo Card -->
    <article 
        data-testid="test-todo-card"
        class="todo-card bg-white max-w-[420px] w-full rounded-3xl border border-slate-100 overflow-hidden">
        
        <div class="p-6">
            
            <!-- Header: Checkbox + Title + Priority + Status -->
            <div class="flex items-start justify-between gap-4">
                
                <!-- Checkbox -->
                <div class="flex items-center gap-3 flex-1">
                    <input 
                        type="checkbox" 
                        id="complete-toggle"
                        data-testid="test-todo-complete-toggle"
                        aria-labelledby="todo-title"
                        class="w-6 h-6 accent-blue-600 border-2 border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 cursor-pointer">
                    
                    <!-- Title -->
                    <h3 
                        id="todo-title"
                        data-testid="test-todo-title"
                        class="text-2xl font-semibold text-slate-900 leading-tight flex-1">
                        Build Testable Todo Card
                    </h3>
                </div>
                
                <!-- Priority & Status -->
                <div class="flex flex-col items-end gap-2">
                    <!-- Priority Badge -->
                    <span 
                        data-testid="test-todo-priority"
                        class="px-4 py-1 text-xs font-semibold rounded-2xl bg-amber-100 text-amber-700 flex items-center gap-1">
                        MEDIUM
                    </span>
                    
                    <!-- Status -->
                    <span 
                        id="todo-status"
                        data-testid="test-todo-status"
                        class="px-4 py-1 text-xs font-semibold rounded-2xl bg-slate-100 text-slate-600 flex items-center">
                        PENDING
                    </span>
                </div>
            </div>
            
            <!-- Description -->
            <p 
                data-testid="test-todo-description"
                class="mt-5 text-slate-600 text-[15px] leading-relaxed">
                Implement a fully testable, accessible, and responsive Todo card component with all required data-testid values, keyboard navigation, and live time-remaining updates.
            </p>
            
            <!-- Due Date + Time Remaining -->
            <div class="mt-6 flex items-center justify-between border-t border-slate-100 pt-6">
                <div>
                    <!-- Due Date -->
                    <time 
                        id="due-date"
                        data-testid="test-todo-due-date"
                        datetime="2026-05-20T23:59:59"
                        class="block text-sm font-medium text-slate-500">
                        Due May 20, 2026
                    </time>
                    
                    <!-- Time Remaining (live) -->
                    <p 
                        id="time-remaining"
                        data-testid="test-todo-time-remaining"
                        aria-live="polite"
                        class="time-remaining text-sm font-semibold text-blue-600 flex items-center gap-1">
                    </p>
                </div>
                
                <!-- Tags -->
                <div 
                    data-testid="test-todo-tags"
                    class="flex flex-wrap justify-end gap-2 max-w-[160px]">
                    <span 
                        data-testid="test-todo-tag-work"
                        class="inline-flex items-center px-3 h-7 text-xs font-medium bg-blue-100 text-blue-700 rounded-3xl">
                        work
                    </span>
                    <span 
                        data-testid="test-todo-tag-urgent"
                        class="inline-flex items-center px-3 h-7 text-xs font-medium bg-red-100 text-red-700 rounded-3xl">
                        urgent
                    </span>
                    <span 
                        class="inline-flex items-center px-3 h-7 text-xs font-medium bg-purple-100 text-purple-700 rounded-3xl">
                        design
                    </span>
                </div>
            </div>
        </div>
        
        <!-- Footer: Edit & Delete -->
        <div class="bg-slate-50 px-6 py-4 flex items-center justify-between border-t border-slate-100">
            
            <!-- Edit Button -->
            <button 
                id="edit-button"
                data-testid="test-todo-edit-button"
                aria-label="Edit this todo"
                class="flex items-center gap-x-2 text-blue-600 hover:text-blue-700 font-medium text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-2xl px-4 py-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
                EDIT
            </button>
            
            <!-- Delete Button -->
            <button 
                id="delete-button"
                data-testid="test-todo-delete-button"
                aria-label="Delete this todo"
                class="flex items-center gap-x-2 text-red-600 hover:text-red-700 font-medium text-sm focus:outline-none focus:ring-2 focus:ring-red-500 rounded-2xl px-4 py-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.595 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.595-1.858L5 7m5 4v6m4-6v6m1-10V9a1 1 0 00-1-1h-4a1 1 0 00-1 1v1M12 4v6m-3-3h6" />
                </svg>
                DELETE
            </button>
        </div>
    </article>

    <script src="script.js" defer></script>
</body>
</html>
